<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kairos</title>
    <!-- img-src allows remote hosts because HTML emails render in a srcdoc
         iframe, which INHERITS this CSP (its own meta CSP can only tighten).
         Scripts stay 'self'-only; the email iframe additionally sandboxes. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' data:"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
