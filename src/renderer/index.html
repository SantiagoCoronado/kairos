<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kairos</title>
    <!-- PWA/mobile chrome for the remote client. Paths are relative so they
         also resolve under Electron's file:// load (where they're unused).
         viewport-fit=cover lets the app paint under the iPhone notch;
         phase-3 styling claims the safe areas via env(safe-area-inset-*). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0b" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- img-src allows remote hosts because HTML emails render in a srcdoc
         iframe, which INHERITS this CSP (its own meta CSP can only tighten).
         Scripts stay 'self'-only; the email iframe additionally sandboxes. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; media-src 'self' data:; connect-src 'self' ws: wss:"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
