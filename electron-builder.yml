appId: com.santiago.kairos
productName: Kairos
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/node-pty/**'
  # onnxruntime ships prebuilt .node binaries + .dylibs the loader dlopens —
  # they can't run from inside the asar (semantic index embedder)
  - '**/node_modules/onnxruntime-node/**'
  - '**/node_modules/@huggingface/transformers/**'
  - '**/node_modules/sharp/**'
  - '**/node_modules/@img/**'
extraResources:
  - from: resources/calendar-helper
    to: calendar-helper
  - from: resources/contacts-helper
    to: contacts-helper
npmRebuild: true
mac:
  identity: null # ad-hoc signing; personal app
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: arm64
  extendInfo:
    NSCalendarsUsageDescription: Command Center shows today's events on your dashboard.
    NSCalendarsFullAccessUsageDescription: Command Center shows today's events on your dashboard.
    NSContactsUsageDescription: Kairos names your WhatsApp chats using your address book.
    NSMicrophoneUsageDescription: Kairos transcribes voice memos into tasks and notes.
